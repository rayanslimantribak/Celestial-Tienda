<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Contacto - Celestial</title>
    <style>
        .contact-form {
            width: 100%;
        }
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 16px;
            font-family: 'Segoe UI', sans-serif;
            resize: vertical;
        }
        .mensaje-exito {
            background: #00C851;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .mensaje-error {
            background: #ff4444;
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<header>
    <div class="logo"><img src="https://i.ibb.co/0pFFxgx6/Celestial-4-removebg-preview.png"></div>
    <nav>
        <a href="inicio.html" data-key="inicio">Inicio</a>
        <a href="productos.html" data-key="productos">Productos</a>
        <a href="presentacion.html" data-key="nosotros">Nosotros</a>
        <a href="contacto.html" data-key="contacto">Contacto</a>
        <a href="ver_carrito.php">Carrito</a>
    </nav>
</header>

<section class="hero">
    <div class="card" style="max-width: 500px;">
        <h2 data-key="contacto_titulo">Contacto</h2>
        
        <div id="mensajeExito" class="mensaje-exito">
            ✅ Mensaje enviado correctamente. Te responderemos pronto.
        </div>
        
        <div id="mensajeError" class="mensaje-error">
            ❌ Error al enviar el mensaje. Inténtalo de nuevo.
        </div>
        
        <form id="contactForm" class="contact-form">
            <input type="text" id="nombre" placeholder="Nombre completo" required>
            <input type="email" id="email" placeholder="Correo electrónico" required>
            <input type="tel" id="telefono" placeholder="Teléfono (opcional)">
            <textarea id="mensaje" rows="5" placeholder="Escribe tu mensaje..." required></textarea>
            
            <div style="text-align: center;">
                <button type="submit" class="cta-button" style="width: auto; padding: 12px 40px;">Enviar Mensaje</button>
            </div>
        </form>
        
        <div style="margin-top: 30px; text-align: center;">
            <p><strong data-key="email">Email:</strong> celestialtiendasantako@gmail.com</p>
            <p><strong data-key="unete_discord">Discord:</strong> <a href="https://discord.gg/5VQjsnbYaJ" style="color: #7bd5ff;">Únete a nuestro Discord</a></p>
        </div>
    </div>
</section>

<footer><p data-key="derechos">© Celestial</p></footer>

<script src="auth.js"></script>
<script src="traductor.js"></script>
<script src="oscuro.js"></script>
<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const btn = this.querySelector('button[type="submit"]');
    const originalText = btn.textContent;
    btn.textContent = 'Enviando...';
    btn.disabled = true;
    
    const formData = new FormData();
    formData.append('nombre', document.getElementById('nombre').value);
    formData.append('email', document.getElementById('email').value);
    formData.append('telefono', document.getElementById('telefono').value);
    formData.append('mensaje', document.getElementById('mensaje').value);
    
    fetch('enviar_contacto.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        btn.textContent = originalText;
        btn.disabled = false;
        
        if (data.success) {
            document.getElementById('mensajeExito').style.display = 'block';
            document.getElementById('mensajeError').style.display = 'none';
            this.reset();
            
            setTimeout(() => {
                document.getElementById('mensajeExito').style.display = 'none';
            }, 5000);
        } else {
            document.getElementById('mensajeError').style.display = 'block';
            document.getElementById('mensajeExito').style.display = 'none';
        }
    })
    .catch(error => {
        btn.textContent = originalText;
        btn.disabled = false;
        document.getElementById('mensajeError').style.display = 'block';
        document.getElementById('mensajeExito').style.display = 'none';
    });
});
</script>
</body>
</html>
