</head>
<body>
<header>
    <div class="logo"><img src="https://i.ibb.co/0pFFxgx6/Celestial-4-removebg-preview.png"></div>
    <nav>
        <a href="inicio.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="presentacion.html">Nosotros</a>
        <a href="contacto.html">Contacto</a>
        <a href="ver_carrito.php">Carrito</a>
    </nav>
</header>

<section class="hero">
    <div class="card" style="max-width: 600px;">
        <h2>Mi Área Personal</h2>
        
        <div class="profile-info">
            <h3>Información del Usuario</h3>
            <p><strong>Nombre:</strong> <span id="userName">Cargando...</span></p>
            <p><strong>Email:</strong> <span id="userEmail">Cargando...</span></p>
            <p><strong>Miembro desde:</strong> <span id="joinDate">Cargando...</span></p>
        </div>
        
        <div class="profile-actions" style="margin-top: 30px; border-top: 1px solid #eee; padding-top: 20px; display: flex; gap: 15px; justify-content: center; flex-wrap: wrap;">
            <button class="cta-button" onclick="location.href='mis_pedidos.php'" style="width: auto; padding: 12px 25px;">Mis Pedidos</button>
            <button class="cta-button" onclick="location.href='ver_carrito.php'" style="width: auto; padding: 12px 25px; background: #7bd5ff;">Ver Carrito</button>
            <button class="cta-button" onclick="location.href='productos.html'" style="width: auto; padding: 12px 25px; background: #00C851;">Seguir Comprando</button>
            <button class="cta-button" onclick="eliminarCuenta()" style="width: auto; padding: 12px 25px; background: #ff4444;">Eliminar Cuenta</button>
        </div>
        
        <div id="adminPanel" style="display: none; margin-top: 20px; padding: 15px; background: #ff9800; border-radius: 10px;">
            <h3 style="color: white; margin-bottom: 10px;">Panel de Administración</h3>
            <button class="cta-button" onclick="location.href='admin_pedidos.php'" style="width: auto; padding: 10px 20px; background: #333;">Gestionar Pedidos</button>
        </div>
    </div>
</section>

<footer><p>© Celestial</p></footer>

<script src="auth.js"></script>
<script src="traductor.js"></script>
<script src="oscuro.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const currentUser = JSON.parse(localStorage.getItem('celestial_currentUser'));
        
        if (currentUser) {
            document.getElementById('userName').textContent = currentUser.name;
            document.getElementById('userEmail').textContent = currentUser.email;
            document.getElementById('joinDate').textContent = currentUser.joinDate;
            
            if (currentUser.id == 1) {
                document.getElementById('adminPanel').style.display = 'block';
            }
        } else {
            window.location.href = 'login.html';
        }
    });
    
    function eliminarCuenta() {
        if (confirm('¿Estás seguro de que quieres eliminar tu cuenta? Esta acción es irreversible.')) {
            if (confirm('Última advertencia: Todos tus datos (pedidos, direcciones, carrito) se perderán. ¿Confirmas?')) {
                fetch('eliminar_cuenta.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert(data.message);
                        localStorage.removeItem('celestial_currentUser');
                        window.location.href = 'inicio.html';
                    } else {
                        alert('Error: ' + data.message);
                    }
                });
            }
        }
    }
</script>
</body>
</html>
