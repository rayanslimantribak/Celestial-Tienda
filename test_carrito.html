<!DOCTYPE html>
<html>
<head>
    <title>Test Carrito</title>
</head>
<body>
    <h2>Probar Añadir al Carrito</h2>
    <button onclick="testCarrito()">Añadir Producto Test</button>
    <div id="resultado"></div>

    <script>
    function testCarrito() {
        fetch('carrito.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                producto_id: 999,
                producto_nombre: 'Producto Test',
                producto_precio: 9.99,
                producto_imagen: 'https://i.ibb.co/rGtjFgkn/1-removebg-preview.png',
                talla: 'M'
            })
        })
        .then(response => response.json())
        .then(data => {
            document.getElementById('resultado').innerHTML = '<pre>' + JSON.stringify(data, null, 2) + '</pre>';
        })
        .catch(error => {
            document.getElementById('resultado').innerHTML = 'Error: ' + error;
        });
    }
    </script>
</body>
</html>
